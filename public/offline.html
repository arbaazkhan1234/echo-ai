<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echo — You're offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background: #0A0914;
      color: #F0EDE6;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      font-family: 'Bodoni Moda', Georgia, serif;
      font-style: italic;
      font-size: 3rem;
      font-weight: 400;
      color: #C9A84C;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }
    h1 {
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 300;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 0.9rem;
      color: rgba(240,237,230,0.5);
      line-height: 1.7;
      max-width: 300px;
      margin: 0 auto 32px;
    }
    button {
      height: 46px;
      padding: 0 28px;
      background: linear-gradient(135deg, #A8854E, #C9A84C);
      border: none;
      border-radius: 14px;
      color: #0A0914;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div>
    <div class="icon">E</div>
    <h1>You're offline</h1>
    <p>Echo needs a connection right now. Check your network and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
